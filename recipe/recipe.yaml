schema_version: 1

context:
  name: pipe-operator
  version: "2.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pipe_operator-${{ version }}.tar.gz
  sha256: 4826d71b888f54e0542161e72bece9dd4f1e7f637a643bd5039c075e6f889c80

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - typing_extensions >=4.12.2

tests:
  - python:
      imports:
        - pipe_operator
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: "Elixir's pipe operator in Python"
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Jordan-Kowal/pipe-operator

extra:
  recipe-maintainers:
    - thewchan
