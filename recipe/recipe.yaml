schema_version: 1

context:
  name: pipe-operator
  version: "2.0.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pipe_operator-${{ version }}.tar.gz
  sha256: 73717345f321c49c17f65532c8af0600fc03c089cf9e851f0229e32fd06724bc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - typing_extensions >=4.12.2

tests:
  - python:
      imports:
        - pipe_operator
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: "Elixir's pipe operator in Python"
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Jordan-Kowal/pipe-operator

extra:
  recipe-maintainers:
    - thewchan
